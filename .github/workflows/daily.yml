name: Daily watchlist check

on:
  schedule:
    # ~08:00 UK time (no DST awareness in GH Actions cron; drifts an hour in BST)
    - cron: "0 7 * * *"
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e .

      - name: Run watchlist check
        env:
          LETTERBOXD_USERNAME: ${{ secrets.LETTERBOXD_USERNAME }}
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
        run: python -m watchlist_justwatch.main

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state.json dashboard.html
          git diff --cached --quiet || git commit -m "Update watchlist state [skip ci]"
          git push

      # The watchlist check, email, and state commit above are the parts that
      # matter — they've already succeeded by this point. Pages deployment is
      # a nice-to-have mirror of the dashboard; GitHub's Pages deploy step
      # occasionally has transient hiccups (e.g. right after first enabling
      # Pages), and those shouldn't mark the whole daily run as failed or
      # send an alarming failure email when the actual functionality worked.
      - name: Prepare Pages site
        continue-on-error: true
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html
          cp manifest.json _site/manifest.json
          cp -r icons _site/icons

      - name: Upload Pages artifact
        continue-on-error: true
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        continue-on-error: true
        uses: actions/deploy-pages@v4

      - name: Note Pages deployment status
        if: steps.deployment.outcome == 'failure'
        run: echo "::warning::GitHub Pages deployment failed (transient hiccups are common) — the site will just show yesterday's build until the next successful run. Watchlist check, email, and state commit above are unaffected."
